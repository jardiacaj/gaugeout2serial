name: Bug report
description: Something is not working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in as much detail as possible.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact command(s) you ran.
      placeholder: |
        1. `gaugeout2serial -v`
        2. …
    validations:
      required: true

  - type: input
    id: hardware
    attributes:
      label: Wheel / hardware
      description: Wheelbase model and any relevant hardware details.
      placeholder: "e.g. Moza R5 firmware 1.2.3"

  - type: input
    id: sim
    attributes:
      label: Sim / OutGauge source
      placeholder: "e.g. BeamNG.drive 0.36, OutGauge port 4444"
    validations:
      required: true

  - type: dropdown
    id: python-version
    attributes:
      label: Python version
      options:
        - "3.11"
        - "3.12"
        - "3.13"
        - "3.14+"
    validations:
      required: true

  - type: input
    id: distro
    attributes:
      label: Linux distribution
      placeholder: "e.g. Fedora 41, Ubuntu 25.10"
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Full terminal output
      description: Paste the complete output including any error messages.
      render: text
